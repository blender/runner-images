name: Build and Push Image (Reusable)

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: "e.g. bpy, cuda, base"
      tag:
        required: true
        type: string
        description: "Docker tag, e.g. latest or 1.2.3"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: images/${{ inputs.image_name }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ inputs.image_name }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository }}/${{ inputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
